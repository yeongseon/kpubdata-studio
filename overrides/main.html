{#-
  mkdocs-material 테마 오버라이드 (#34).

  Mermaid CDN 스크립트를 SRI(integrity) + crossorigin과 함께 로드한다. 버전을 정확히
  고정(10.9.3)해 CDN 자산이 바뀌어도 무결성 해시가 맞지 않으면 실행되지 않도록 한다
  (공급망 공격 방어). javascripts/mermaid.js 보다 먼저 로드되도록 super() 앞에 둔다.
-#}
{% extends "base.html" %}

{% block scripts %}
  <script
    src="https://unpkg.com/mermaid@10.9.3/dist/mermaid.min.js"
    integrity="sha384-R63zfMfSwJF4xCR11wXii+QUsbiBIdiDzDbtxia72oGWfkT7WHJfmD/I/eeHPJyT"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  ></script>
  {{ super() }}
{% endblock %}
