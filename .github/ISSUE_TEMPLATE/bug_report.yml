name: 버그 리포트
description: 예상과 다르게 동작하는 문제를 신고합니다
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그를 신고해 주셔서 감사합니다. 재현에 필요한 정보를 최대한 채워주세요.
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 무엇이 잘못되었나요?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 절차
      description: 문제를 재현하는 단계별 절차
      placeholder: |
        1. `/builds/new` 화면으로 이동
        2. ...
        3. 오류 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작 / 콘솔 오류
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 브라우저, OS, 화면 라우트, MOCK/실연동 모드 등
      placeholder: |
        - 브라우저: Chrome 125
        - OS: macOS 14
        - 라우트: /builds/:id/run
        - 모드: MOCK
    validations:
      required: false
