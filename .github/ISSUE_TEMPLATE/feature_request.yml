name: 기능 제안
description: 새로운 기능이나 개선을 제안합니다
title: "[Feature] "
labels: ["enhancement", "type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편이나 한계를 해결하려는 건가요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작이나 화면/흐름을 설명하세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 검토
      description: 고려한 다른 방법이 있다면 적어주세요.
    validations:
      required: false
