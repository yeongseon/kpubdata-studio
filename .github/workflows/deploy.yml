name: Deploy demo + docs

# GitHub Pages에 두 가지를 함께 배포한다.
#   - 루트(/kpubdata-studio/)        : Studio 앱 데모 (mock 데이터 모드)
#   - /kpubdata-studio/docs/         : mkdocs 문서 사이트
# 앱은 VITE_USE_REAL_BUILDER를 설정하지 않으므로 라이브 Builder 없이 mock 데이터로 동작한다.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Studio 앱(데모) 빌드: dist/ 루트 ---
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build # base=/kpubdata-studio/, mock 모드(실 Builder 미설정)

      # --- 문서 빌드: site/ ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - run: mkdocs build --strict

      # --- 배포 아티팩트 합치기: 앱은 루트, 문서는 /docs ---
      - name: Combine app + docs into publish dir
        run: |
          mkdir -p dist/docs
          cp -r site/. dist/docs/
          # SPA(history 라우팅) 새로고침/딥링크 대응: 알 수 없는 경로를 index.html로 폴백
          cp dist/index.html dist/404.html
          # Jekyll 처리 비활성화(_로 시작하는 에셋 무시 방지)
          touch dist/.nojekyll

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
