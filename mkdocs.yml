site_name: "KPubData Studio"
site_url: "https://yeongseon.github.io/kpubdata-studio/"
repo_url: "https://github.com/yeongseon/kpubdata-studio"
repo_name: "yeongseon/kpubdata-studio"

theme:
  name: material
  custom_dir: overrides
  language: ko
  palette:
    primary: deep purple
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - 사용 가이드:
      - API 규약: API_CONTRACT.md
      - 상태 모델: STATE_MODEL.md
      - 사용자 흐름: USER_FLOWS.md
      - 화면 스크린샷: screenshots.md
  - 아키텍처:
      - 시스템 구조: ARCHITECTURE.md
      - 정보 구조: INFORMATION_ARCHITECTURE.md
      - UI 규격: UI_SPEC.md
  - 개발 가이드:
      - 기여 방법: CONTRIBUTING.md
      - 에이전트 가이드: AGENTS.md
  - 프로젝트:
      - 요구사항 (PRD): PRD.md
      - 로드맵: ROADMAP.md
      - 변경 이력: CHANGELOG.md
  - ADR:
      - Studio as Control Surface: adrs/0001-studio-as-control-surface.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - toc:
      permalink: true

# Mermaid CDN 스크립트는 SRI(integrity) 적용을 위해 overrides/main.html에서 직접 로드한다
# (#34). extra_javascript 문자열 항목은 integrity 속성을 실을 수 없기 때문이다.
extra_javascript:
  - javascripts/mermaid.js
